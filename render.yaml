services:
  - type: web
    name: personality-test
    runtime: docker
    plan: free

    envVars:
      - key: RAILS_MASTER_KEY
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: personality-test-db
          property: connectionString

databases:
  - name: personality-test-db
    databaseName: personality_test_production
    user: personality_test